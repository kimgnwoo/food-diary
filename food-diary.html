<!DOCTYPE html>
<html lang="ko" style="background:#f5f0e8">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="식이 일지" />
  <meta name="theme-color" content="#f5f0e8" />
  <title>식이 일지 · CBT-E</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f0e8;
      font-family: 'Georgia', 'Batang', serif;
      color: #1a1a1a;
      padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 70px));
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: max(40px, env(safe-area-inset-top)) 20px 0;
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(20px, env(safe-area-inset-right));
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 24px; }
    .pill {
      display: inline-block;
      background: #2c2c2c; color: #f5f0e8;
      font-size: 10px; letter-spacing: 0.12em;
      padding: 4px 14px; border-radius: 100px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    h1 { font-size: 38px; font-weight: bold; letter-spacing: -0.02em; margin-bottom: 4px; color: #1a1a1a; }
    .today-date { font-size: 12px; color: #888; letter-spacing: 0.04em; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #555; font-style: italic; }

    /* ── Tab Nav ── */
    .tab-nav {
      display: flex;
      background: #ede8dc;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 2px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 4px;
      border: none;
      border-radius: 9px;
      background: transparent;
      font-family: 'Georgia', serif;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .tab-btn.active {
      background: #fff;
      color: #1a1a1a;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* ── Tip bar ── */
    .tip-bar {
      display: flex; align-items: flex-start; gap: 10px;
      background: #ede8dc; border: 1px solid #d9d2c4;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
    }
    .tip-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .tip-text { font-size: 12px; color: #444; line-height: 1.6; }

    /* ── Cards ── */
    .card {
      background: #fff; border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 17px; font-weight: normal;
      letter-spacing: -0.01em; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .count-badge { font-size: 12px; color: #999; }

    /* ── Form ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; overflow: hidden; }
    .field-group { margin-bottom: 14px; }
    label {
      display: block; font-size: 10px; font-weight: bold;
      color: #555; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 5px;
    }
    input, textarea, select {
      width: 100%; min-width: 0;
      padding: 10px 12px;
      border: 1.5px solid #e0d8cc; border-radius: 8px;
      font-size: 14px; color: #1a1a1a; background: #faf8f4;
      outline: none; font-family: 'Georgia', serif;
      transition: border-color 0.2s;
    }
    input[type="time"] { appearance: none; -webkit-appearance: none; }
    input:focus, textarea:focus, select:focus { border-color: #a09080; }
    textarea { resize: vertical; line-height: 1.6; }

    .binge-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    #binge-btn {
      padding: 8px 14px; border-radius: 8px;
      border: 1.5px solid #d0c8bc; background: #faf8f4;
      color: #555; font-size: 13px; cursor: pointer;
      font-family: 'Georgia', serif; transition: all 0.2s;
      white-space: nowrap;
    }
    #binge-btn.active { background: #fde8e8; border-color: #e07070; color: #c04040; }
    .binge-hint { font-size: 11px; color: #999; font-style: italic; }

    #add-btn {
      width: 100%; padding: 13px;
      background: #2c2c2c; color: #f5f0e8;
      border: none; border-radius: 10px;
      font-size: 15px; cursor: pointer;
      font-family: 'Georgia', serif; letter-spacing: 0.04em;
      transition: all 0.3s;
    }
    #add-btn:active { background: #444; }
    #add-btn.success { background: #5a8a5a; }

    /* ── Entry Cards ── */
    .entries-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .entry-card {
      background: #fff; border-radius: 12px; padding: 14px 16px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      border-left: 3px solid #c8bfb0;
      animation: slideIn 0.25s ease;
    }
    .entry-card.binge { border-left-color: #e07070; background: #fffafa; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .entry-time { font-size: 15px; font-weight: bold; letter-spacing: 0.04em; }
    .binge-badge {
      background: #fde8e8; color: #c04040;
      font-size: 10px; padding: 2px 8px;
      border-radius: 100px; letter-spacing: 0.04em;
    }
    .delete-btn {
      margin-left: auto; background: none; border: none;
      color: #bbb; cursor: pointer; font-size: 14px;
      padding: 2px 6px; border-radius: 4px; transition: color 0.2s;
    }
    .entry-food { font-size: 13px; line-height: 1.5; margin-bottom: 4px; }
    .entry-meta { font-size: 12px; color: #777; margin-bottom: 3px; }
    .entry-thoughts {
      font-size: 12px; color: #555; font-style: italic;
      line-height: 1.6; border-top: 1px solid #f0ebe2;
      padding-top: 6px; margin-top: 6px;
    }

    /* ── Summary Bar ── */
    .summary {
      display: flex; background: #fff; border-radius: 12px;
      padding: 14px 20px; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      justify-content: space-around; align-items: center;
    }
    .summary-item { text-align: center; }
    .summary-num { display: block; font-size: 26px; color: #1a1a1a; line-height: 1; margin-bottom: 3px; }
    .summary-num.binge-num { color: #e07070; }
    .summary-num.normal-num { color: #6a9a6a; }
    .summary-label { font-size: 10px; color: #999; letter-spacing: 0.06em; text-transform: uppercase; }
    .summary-divider { width: 1px; height: 36px; background: #e8e2d8; }

    /* ── Empty ── */
    .empty-state {
      text-align: center; padding: 48px 0; color: #aaa;
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { font-size: 14px; line-height: 1.8; font-style: italic; }

    /* ── Date Picker (조회 탭) ── */
    .date-picker-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    }
    .date-picker-row input[type="date"] { flex: 1; }
    .date-nav-btn {
      padding: 10px 14px; border: 1.5px solid #e0d8cc;
      border-radius: 8px; background: #faf8f4;
      font-size: 16px; cursor: pointer; color: #555;
      transition: background 0.2s;
    }
    .date-nav-btn:active { background: #ede8dc; }

    /* ── Analysis (분석 탭) ── */
    .period-tabs {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .period-btn {
      flex: 1; padding: 8px; border: 1.5px solid #e0d8cc;
      border-radius: 8px; background: #faf8f4;
      font-family: 'Georgia', serif; font-size: 13px;
      color: #555; cursor: pointer; transition: all 0.2s;
    }
    .period-btn.active {
      background: #2c2c2c; color: #f5f0e8; border-color: #2c2c2c;
    }

    .analysis-stat-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: #faf8f4; border-radius: 12px;
      padding: 16px; text-align: center;
      border: 1px solid #e8e2d8;
    }
    .stat-box-num { font-size: 28px; color: #1a1a1a; display: block; line-height: 1; margin-bottom: 4px; }
    .stat-box-num.red { color: #e07070; }
    .stat-box-num.green { color: #6a9a6a; }
    .stat-box-label { font-size: 11px; color: #888; letter-spacing: 0.04em; }

    .chart-wrap { margin-bottom: 20px; }
    .chart-title { font-size: 13px; color: #555; margin-bottom: 10px; letter-spacing: 0.02em; }
    .bar-chart-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; }
    .bar-chart.week { width: 100%; height: 90px; }
    .bar-chart.month { width: max-content; min-width: 100%; height: 90px; }
    .bar-chart.week .bar-col { flex: 1; }
    .bar-chart.month .bar-col { width: 24px; flex-shrink: 0; }
    .bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bar-track { width: 100%; height: 58px; background: #f0ebe2; border-radius: 4px; overflow: hidden; display: flex; align-items: flex-end; }
    .bar-fill { width: 100%; background: #c8bfb0; border-radius: 4px 4px 0 0; transition: height 0.5s ease; }
    .bar-fill.has-binge { background: #e09090; }
    .bar-label { font-size: 9px; color: #999; text-align: center; white-space: nowrap; }
    .bar-val { font-size: 9px; color: #555; height: 11px; }

    .pattern-list { display: flex; flex-direction: column; gap: 8px; }
    .pattern-item {
      display: flex; align-items: center; gap: 12px;
      background: #faf8f4; border-radius: 10px; padding: 12px 14px;
      border: 1px solid #e8e2d8;
    }
    .pattern-icon { font-size: 18px; flex-shrink: 0; }
    .pattern-text { font-size: 13px; color: #444; line-height: 1.5; }
    .pattern-text strong { color: #1a1a1a; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(245, 240, 232, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid #e0d8cc;
      display: flex;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      padding: 4px 0; transition: opacity 0.2s;
    }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label { font-size: 10px; color: #888; letter-spacing: 0.04em; font-family: 'Georgia', serif; }
    .nav-btn.active .nav-label { color: #2c2c2c; font-weight: bold; }
    .nav-btn.active .nav-icon { filter: saturate(1.5); }

    /* ── Footer ── */
    footer {
      text-align: center; font-size: 10px; color: #bbb;
      letter-spacing: 0.04em; margin-top: 32px; line-height: 1.8;
      padding-bottom: 20px;
    }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    @media (max-width: 480px) {
      h1 { font-size: 30px; }
      .card { padding: 18px 14px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div><span class="pill">CBT-E · Fairburn Protocol</span></div>
      <h1>식이 일지</h1>
      <p class="today-date" id="today-date"></p>
      <p class="subtitle">판단 없이, 있는 그대로 기록하세요.</p>
    </header>

    <!-- ── 오늘 기록 탭 ── -->
    <div class="page active" id="page-today">

      <div class="tip-bar">
        <span class="tip-icon">💡</span>
        <p class="tip-text" id="tip-text"></p>
      </div>

      <div class="card">
        <h2 class="section-title">새 기록 추가</h2>

        <div class="grid2">
          <div class="field-group">
            <label for="f-time">시간 *</label>
            <input type="time" id="f-time" />
          </div>
          <div class="field-group">
            <label for="f-place">장소</label>
            <input type="text" id="f-place" placeholder="예: 방 (혼자)" />
          </div>
        </div>

        <div class="field-group">
          <label for="f-food">먹은 음식 및 음료 *</label>
          <input type="text" id="f-food" placeholder="예: 과자 2봉지, 아이스크림 1개" />
        </div>

        <div class="field-group">
          <label for="f-compensation">보상 행동</label>
          <input type="text" id="f-compensation" placeholder="예: 1시간 운동 / 없음" />
        </div>

        <div class="field-group">
          <label for="f-thoughts">생각 · 감정 · 상황</label>
          <textarea id="f-thoughts" rows="3" placeholder="예: 야근 후 지치고 불안했음"></textarea>
        </div>

        <div class="binge-row">
          <button id="binge-btn" onclick="toggleBinge()">폭식 여부 체크</button>
          <span class="binge-hint">조절 못했다고 느꼈다면 체크하세요</span>
        </div>

        <button id="add-btn" onclick="addEntry()">+ 기록 추가</button>
      </div>

      <div id="today-entries-section" style="display:none">
        <h2 class="section-title">
          오늘의 기록
          <span class="count-badge" id="count-badge"></span>
        </h2>
        <div class="entries-list" id="entries-list"></div>
        <div class="summary">
          <div class="summary-item">
            <span class="summary-num" id="sum-total">0</span>
            <span class="summary-label">총 기록</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-item">
            <span class="summary-num binge-num" id="sum-binge">0</span>
            <span class="summary-label">폭식 삽화</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-item">
            <span class="summary-num normal-num" id="sum-normal">0</span>
            <span class="summary-label">일반 식사</span>
          </div>
        </div>
      </div>

      <div class="empty-state" id="today-empty">
        <p class="empty-icon">📋</p>
        <p class="empty-text">아직 기록이 없어요.<br>첫 번째 식사를 기록해보세요.</p>
      </div>

      <footer>
        <p>페어번(Fairburn) CBT-E 프로토콜 기반 · 치료 보조 도구</p>
        <p>이 일지는 전문 치료를 대체하지 않습니다.</p>
      </footer>
    </div>

    <!-- ── 날짜별 조회 탭 ── -->
    <div class="page" id="page-history">
      <div class="card">
        <h2 class="section-title">날짜별 기록 조회</h2>
        <div class="date-picker-row">
          <button class="date-nav-btn" onclick="shiftDate(-1)">◀</button>
          <input type="date" id="history-date" onchange="renderHistory()" />
          <button class="date-nav-btn" onclick="shiftDate(1)">▶</button>
        </div>
        <div id="history-content"></div>
      </div>
    </div>

    <!-- ── 분석 탭 ── -->
    <div class="page" id="page-analysis">
      <div class="card">
        <h2 class="section-title">패턴 분석</h2>
        <div class="period-tabs">
          <button class="period-btn active" onclick="setPeriod('week', this)">주간</button>
          <button class="period-btn" onclick="setPeriod('month', this)">월간</button>
        </div>
        <div id="analysis-content"></div>
      </div>
    </div>

  </div><!-- /container -->

  <!-- ── Bottom Nav ── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">오늘</span>
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">기록 조회</span>
    </button>
    <button class="nav-btn" id="nav-analysis" onclick="switchTab('analysis')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">패턴 분석</span>
    </button>
  </nav>

  <script>
    /* ──────────────────────────────
       유틸
    ────────────────────────────── */
    const tips = [
      "먹은 직후 바로 기록하세요 — 감정이 가장 선명할 때입니다.",
      "칼로리 계산은 하지 않아도 돼요. 양 추정치만 적으세요.",
      "잘 먹으려고 쓰는 일지가 아닙니다. 있는 그대로 솔직하게 적으세요.",
      "폭식 여부는 조절하지 못했다고 느꼈을 때 체크하세요.",
      "생각·감정 칸이 가장 중요합니다. 짧아도 괜찮아요.",
    ];
    let tipIndex = 0;
    let isBinge = false;
    let analysisPeriod = 'week';

    function toLocalDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
    const todayStr = toLocalDateStr(new Date());
    const todayKey = "diary_" + todayStr;

    function getEntries(dateStr) {
      try { return JSON.parse(localStorage.getItem("diary_" + dateStr) || "[]"); }
      catch { return []; }
    }
    function setEntries(dateStr, arr) {
      localStorage.setItem("diary_" + dateStr, JSON.stringify(arr));
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ──────────────────────────────
       탭 전환
    ────────────────────────────── */
    function switchTab(tab) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
      document.getElementById('nav-' + tab).classList.add('active');
      if (tab === 'history') renderHistory();
      if (tab === 'analysis') renderAnalysis();
    }

    /* ──────────────────────────────
       오늘 기록 탭
    ────────────────────────────── */
    document.getElementById("today-date").textContent =
      new Date().toLocaleDateString("ko-KR", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
    document.getElementById("tip-text").textContent = tips[0];

    let entries = getEntries(todayStr);

    function toggleBinge() {
      isBinge = !isBinge;
      const btn = document.getElementById("binge-btn");
      btn.textContent = isBinge ? "✓ 폭식 있음" : "폭식 여부 체크";
      btn.classList.toggle("active", isBinge);
    }

    function addEntry() {
      const time = document.getElementById("f-time").value;
      const food = document.getElementById("f-food").value.trim();
      if (!time || !food) { alert("시간과 음식은 필수 항목이에요."); return; }

      const entry = {
        id: Date.now(), time, food,
        place: document.getElementById("f-place").value.trim(),
        compensation: document.getElementById("f-compensation").value.trim(),
        thoughts: document.getElementById("f-thoughts").value.trim(),
        binge: isBinge,
      };

      entries.push(entry);
      entries.sort((a,b) => a.time.localeCompare(b.time));
      setEntries(todayStr, entries);

      ["f-time","f-food","f-place","f-compensation","f-thoughts"].forEach(id => document.getElementById(id).value="");
      isBinge = false;
      const bBtn = document.getElementById("binge-btn");
      bBtn.textContent = "폭식 여부 체크"; bBtn.classList.remove("active");

      const addBtn = document.getElementById("add-btn");
      addBtn.textContent = "✓ 저장됨"; addBtn.classList.add("success");
      setTimeout(() => { addBtn.textContent = "+ 기록 추가"; addBtn.classList.remove("success"); }, 1800);

      tipIndex = (tipIndex+1) % tips.length;
      document.getElementById("tip-text").textContent = tips[tipIndex];
      renderToday();
    }

    function deleteEntry(id) {
      entries = entries.filter(e => e.id !== id);
      setEntries(todayStr, entries);
      renderToday();
    }

    function renderToday() {
      const section = document.getElementById("today-entries-section");
      const empty = document.getElementById("today-empty");
      if (entries.length === 0) { section.style.display="none"; empty.style.display="block"; return; }
      section.style.display="block"; empty.style.display="none";

      const binge = entries.filter(e=>e.binge).length;
      document.getElementById("count-badge").textContent = entries.length+"건";
      document.getElementById("sum-total").textContent = entries.length;
      document.getElementById("sum-binge").textContent = binge;
      document.getElementById("sum-normal").textContent = entries.length - binge;

      document.getElementById("entries-list").innerHTML = entries.map(e => entryCardHTML(e, true)).join('');
    }

    function entryCardHTML(e, showDelete) {
      return `
        <div class="entry-card ${e.binge?'binge':''}">
          <div class="entry-header">
            <span class="entry-time">${e.time}</span>
            ${e.binge?'<span class="binge-badge">폭식</span>':''}
            ${showDelete?`<button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button>`:''}
          </div>
          <p class="entry-food">${escHtml(e.food)}</p>
          ${e.place?`<p class="entry-meta">📍 ${escHtml(e.place)}</p>`:''}
          ${e.compensation?`<p class="entry-meta">🔄 ${escHtml(e.compensation)}</p>`:''}
          ${e.thoughts?`<p class="entry-thoughts">💭 ${escHtml(e.thoughts)}</p>`:''}
        </div>`;
    }

    /* ──────────────────────────────
       날짜별 조회 탭
    ────────────────────────────── */
    document.getElementById("history-date").value = todayStr;

    function shiftDate(delta) {
      const input = document.getElementById("history-date");
      const d = new Date(input.value + "T00:00:00");
      d.setDate(d.getDate() + delta);
      input.value = toLocalDateStr(d);
      renderHistory();
    }

    function renderHistory() {
      const dateStr = document.getElementById("history-date").value;
      const data = getEntries(dateStr);
      const label = new Date(dateStr + "T00:00:00").toLocaleDateString("ko-KR",
        { year:"numeric", month:"long", day:"numeric", weekday:"long" });
      const binge = data.filter(e=>e.binge).length;
      const el = document.getElementById("history-content");

      if (data.length === 0) {
        el.innerHTML = `<div class="empty-state"><p class="empty-icon">📭</p><p class="empty-text">${label}<br>기록이 없어요.</p></div>`;
        return;
      }

      el.innerHTML = `
        <p style="font-size:13px;color:#888;margin-bottom:14px;">${label}</p>
        <div class="summary" style="margin-bottom:16px;">
          <div class="summary-item"><span class="summary-num">${data.length}</span><span class="summary-label">총 기록</span></div>
          <div class="summary-divider"></div>
          <div class="summary-item"><span class="summary-num binge-num">${binge}</span><span class="summary-label">폭식 삽화</span></div>
          <div class="summary-divider"></div>
          <div class="summary-item"><span class="summary-num normal-num">${data.length-binge}</span><span class="summary-label">일반 식사</span></div>
        </div>
        <div class="entries-list">${data.map(e=>entryCardHTML(e,false)).join('')}</div>`;
    }

    /* ──────────────────────────────
       분석 탭
    ────────────────────────────── */
    function setPeriod(p, btn) {
      analysisPeriod = p;
      document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderAnalysis();
    }

    function getDateRange(period) {
      const dates = [];
      const today = new Date();
      const count = period === 'week' ? 7 : 30;
      for (let i = count-1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        dates.push(toLocalDateStr(d));
      }
      return dates;
    }

    function renderAnalysis() {
      const dates = getDateRange(analysisPeriod);
      const isWeek = analysisPeriod === 'week';

      // 데이터 집계
      let totalMeals = 0, totalBinge = 0;
      const dailyData = dates.map(d => {
        const entries = getEntries(d);
        const binge = entries.filter(e=>e.binge).length;
        totalMeals += entries.length;
        totalBinge += binge;
        return { date: d, total: entries.length, binge };
      });

      const maxTotal = Math.max(...dailyData.map(d=>d.total), 1);

      // 요일별 라벨
      const dayLabels = isWeek
        ? ['일','월','화','수','목','금','토']
        : null;

      function barLabel(dateStr) {
        if (isWeek) {
          const d = new Date(dateStr + "T00:00:00");
          return dayLabels[d.getDay()];
        } else {
          return dateStr.slice(8); // DD
        }
      }

      // 패턴 인사이트
      const insights = [];
      const bingeDays = dailyData.filter(d=>d.binge>0).length;
      const avgMeals = totalMeals / dates.length;

      if (totalBinge === 0) {
        insights.push({ icon:"🌿", text:`<strong>${isWeek?'이번 주':'이번 달'}</strong> 폭식 삽화가 기록되지 않았어요.` });
      } else {
        insights.push({ icon:"📌", text:`폭식 삽화가 있었던 날: <strong>${bingeDays}일</strong> / 총 <strong>${totalBinge}회</strong>` });
      }

      if (avgMeals > 0) {
        insights.push({ icon:"🍽", text:`하루 평균 <strong>${avgMeals.toFixed(1)}회</strong> 식사가 기록됐어요.` });
      }

      // 폭식이 많은 요일 찾기 (주간만)
      if (isWeek && totalBinge > 0) {
        const worst = dailyData.reduce((a,b) => b.binge > a.binge ? b : a);
        if (worst.binge > 0) {
          const wd = new Date(worst.date+"T00:00:00");
          insights.push({ icon:"⚠️", text:`<strong>${dayLabels[wd.getDay()]}요일</strong>에 폭식 삽화가 집중됐어요.` });
        }
      }

      if (totalMeals === 0) {
        insights.push({ icon:"📝", text:`아직 기록이 없어요. 오늘부터 시작해보세요.` });
      }

      // 바 차트 HTML
      const bars = dailyData.map(d => {
        const pct = d.total > 0 ? Math.round((d.total / maxTotal) * 100) : 0;
        const hasBinge = d.binge > 0;
        return `
          <div class="bar-col">
            ${d.total > 0 ? `<span class="bar-val">${d.total}</span>` : `<span class="bar-val" style="color:transparent">0</span>`}
            <div class="bar-track">
              <div class="bar-fill ${hasBinge?'has-binge':''}" style="height:${pct}%"></div>
            </div>
            <span class="bar-label">${barLabel(d.date)}</span>
          </div>`;
      }).join('');

      const el = document.getElementById("analysis-content");
      el.innerHTML = `
        <div class="analysis-stat-grid">
          <div class="stat-box">
            <span class="stat-box-num">${totalMeals}</span>
            <span class="stat-box-label">총 식사 기록</span>
          </div>
          <div class="stat-box">
            <span class="stat-box-num red">${totalBinge}</span>
            <span class="stat-box-label">폭식 삽화</span>
          </div>
          <div class="stat-box">
            <span class="stat-box-num green">${totalMeals - totalBinge}</span>
            <span class="stat-box-label">일반 식사</span>
          </div>
          <div class="stat-box">
            <span class="stat-box-num">${bingeDays}</span>
            <span class="stat-box-label">폭식 있었던 날</span>
          </div>
        </div>

        <div class="chart-wrap">
          <p class="chart-title">일별 식사 기록 수 <span style="color:#e09090">■</span> 폭식 있는 날${isWeek ? '' : ' · 좌우로 스크롤하세요'}</p>
          <div class="bar-chart-scroll">
            <div class="bar-chart ${isWeek ? 'week' : 'month'}">${bars}</div>
          </div>
        </div>

        <div class="pattern-list">
          ${insights.map(i=>`
            <div class="pattern-item">
              <span class="pattern-icon">${i.icon}</span>
              <span class="pattern-text">${i.text}</span>
            </div>`).join('')}
        </div>`;
    }

    /* ── 초기 렌더 ── */
    renderToday();
  </script>
</body>
</html>
